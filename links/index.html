<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Walter Molitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080808;color:#fff;font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{width:100%;max-width:480px;display:flex;flex-direction:column;align-items:center;gap:16px}
.avatar{width:96px;height:96px;border-radius:50%;background:linear-gradient(135deg,#444,#222);border:2px solid #333;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700;color:#fff;letter-spacing:-1px}
.name{font-size:22px;font-weight:700;color:#fff}
.tagline{font-size:14px;color:#888;text-align:center}
.divider{width:48px;height:1px;background:#222;margin:4px 0}
.link-btn{width:100%;display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-radius:12px;text-decoration:none;transition:opacity .15s}
.link-btn:hover{opacity:.85}
.btn-primary{background:#fff;color:#080808}
.btn-secondary{background:#111;color:#fff;border:1px solid #222}
.btn-text{display:flex;flex-direction:column;gap:2px}
.btn-label{font-size:15px;font-weight:600}
.btn-sub{font-size:12px;opacity:.6}
.btn-arrow{font-size:18px}
.footer{font-size:12px;color:#444;margin-top:8px}
</style>
</head>
<body>
<div class="card">
  <div class="avatar">WM</div>
  <div class="name">Walter Molitor</div>
  <div class="tagline">Podcast &nbsp;&middot;&nbsp; Film &nbsp;&middot;&nbsp; Social</div>
  <div class="divider"></div>
  <a href="https://calendar.app.google/oDRkNhyTrrMWYf466" class="link-btn btn-primary" target="_blank" rel="noopener">
    <span class="btn-text">
      <span class="btn-label">Book a Free 15-Min Call</span>
      <span class="btn-sub">See if we are a fit</span>
    </span>
    <span class="btn-arrow">&#8594;</span>
  </a>
  <a href="https://molitormedia.com" class="link-btn btn-secondary" target="_blank" rel="noopener">
    <span class="btn-text">
      <span class="btn-label">Molitor Media</span>
      <span class="btn-sub">molitormedia.com</span>
    </span>
    <span class="btn-arrow">&#8594;</span>
  </a>
  <a href="https://instagram.com/walterleemolitor" class="link-btn btn-secondary" target="_blank" rel="noopener">
    <span class="btn-text">
      <span class="btn-label">Personal Instagram</span>
      <span class="btn-sub">@walterleemolitor</span>
    </span>
    <span class="btn-arrow">&#8594;</span>
  </a>
  <a href="https://instagram.com/molitormedia" class="link-btn btn-secondary" target="_blank" rel="noopener">
    <span class="btn-text">
      <span class="btn-label">Molitor Media Instagram</span>
      <span class="btn-sub">@molitormedia</span>
    </span>
    <span class="btn-arrow">&#8594;</span>
  </a>
  <div class="footer">Walter Molitor &copy; 2026</div>
</div>
</body>
</html>
